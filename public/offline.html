<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Island - You're Offline</title>
    <meta name="theme-color" content="#ffcc66">
    <style>
        body {
            margin: 0;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0b1220 0%, #1e3a5f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .island-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ffcc66;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 400px;
            line-height: 1.5;
        }
        .retry-btn {
            background: #ffcc66;
            color: #0b1220;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .retry-btn:hover {
            transform: scale(1.05);
        }
        .journal-note {
            margin-top: 2rem;
            padding: 16px;
            background: rgba(255, 204, 102, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 204, 102, 0.3);
        }
    </style>
</head>
<body>
    <div class="island-icon">🏝️</div>
    <h1>You're Offline</h1>
    <p>No worries, brave explorer! Your Quest Island adventure continues even without internet.</p>
    
    <button class="retry-btn" onclick="window.location.reload()">
        Try Again
    </button>
    
    <div class="journal-note">
        <p><strong>📓 Your Journal still works!</strong><br>
        Keep practicing with your saved activities.</p>
    </div>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
