<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Quest Island</title>

    <script>
      // Normalize legacy '?shim=1/<path>' → '/<path>?shim=1'
      (function () {
        try {
          var m = location.search.match(/^\?shim=1\/(.+)/);
          if (m && m[1]) {
            history.replaceState(null, "", "/" + m[1] + "?shim=1" + location.hash);
          }
        } catch {}
      })();

      // Tiny add: if shim mode, force seenTodayLesson=true before any other scripts run
      (function () {
        var hasShim =
          /(?:\?|&)shim=1(?:&|$)/.test(location.search) ||
          /^\?shim=1(?:\/|$)/.test(location.search);
        if (!hasShim) return;

        try {
          Object.defineProperty(window, "seenTodayLesson", {
            configurable: false,
            enumerable: true,
            get: function () { return true; },
            set: function () {}
          });
        } catch {
          // Fallback if defineProperty fails (older engines)
          window.seenTodayLesson = true;
        }

        // Extra belts & braces for tests that poke localStorage
        try {
          localStorage.setItem("today-lesson", "1");
          localStorage.setItem("seenTodayLesson", "1");
        } catch {}
      })();

      // If ?shim=1 is present, flag and inject the CI DOM shim
      (function () {
        var hasShim =
          /(?:\?|&)shim=1(?:&|$)/.test(location.search) ||
          /^\?shim=1(?:\/|$)/.test(location.search);
        if (!hasShim) return;

        // Tell main.tsx not to mount React
        window.__E2E_SHIM_ACTIVE__ = true;

        // Inject the static DOM shim (Vite copies from client/public → dist root)
        var s = document.createElement("script");
        s.src = "/e2e-ci-shim.js";
        s.defer = true;
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body style="opacity:1">
    <div id="root"></div>

    <!-- Vite entry: don't point at /assets/* here. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
