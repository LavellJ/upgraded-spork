<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Quest Island — Calm Adventure Learning</title>

    <!-- App identity -->
    <meta name="application-name" content="Quest Island" />
    <meta name="theme-color" content="#ffcc66" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex,nofollow" />

    <!-- PWA manifest & icons -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Normalize legacy '?shim=1/<path>' to '/<path>?shim=1' before anything boots -->
    <script>
      (function () {
        try {
          var m = location.search.match(/^\?shim=1\/(.+)/);
          if (m && m[1]) {
            history.replaceState(null, "", "/" + m[1] + "?shim=1" + location.hash);
          }
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <noscript>
      This app requires JavaScript to run. Please enable JavaScript in your browser.
    </noscript>

    <div id="root"></div>

    <!-- Load shim only when ?shim=1 -->
    <script>
      (function () {
        if (/[?&]shim=1(?:&|$)/.test(location.search)) {
          var s = document.createElement("script");
          s.src = "/e2e-ci-shim.js";
          document.head.appendChild(s);
        }
      })();
    </script>

    <!-- Main entry (Vite). The shim will skip/remove this when takeover is active. -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Optional Replit dev banner -->
    <script src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
