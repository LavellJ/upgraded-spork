<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Quest Island</title>

    <!-- CI flag + legacy ?shim=1/<path> normalizer (runs BEFORE app) -->
    <script>
      (function () {
        var search = location.search || "";
        var hasShim =
          /(?:\?|&)shim=1(?:&|$)/.test(search) ||
          /^\?shim=1(?:\/|$)/.test(search);
        if (hasShim) {
          // Make this visible to main.tsx so it can skip boot.
          window.__E2E_SHIM_ACTIVE__ = true;

          // Normalize legacy form '?shim=1/<path>' to '/<path>?shim=1'
          var m = search.match(/^\?shim=1\/(.+)/);
          if (m && m[1]) {
            history.replaceState(
              null,
              "",
              "/" + m[1] + "?shim=1" + location.hash
            );
          }

          // Ensure body isn’t hidden by app CSS expectations
          document.documentElement.style.opacity = "1";
          document.body && (document.body.style.opacity = "1");
        }
      })();
    </script>

    <!-- Fonts / CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/assets/index.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Load the CI DOM shim only when ?shim=1 -->
    <script>
      (function () {
        var search = location.search || "";
        var hasShim =
          /(?:\?|&)shim=1(?:&|$)/.test(search) ||
          /^\?shim=1(?:\/|$)/.test(search);
        if (hasShim) {
          var s = document.createElement("script");
          s.src = "/e2e-ci-shim.js";
          s.defer = true;
          document.head.appendChild(s);
        }
      })();
    </script>

    <!-- App bundle is always emitted by Vite; main.tsx will early-return when shim is active -->
    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
