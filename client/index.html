<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Quest Island — Calm Adventure Learning</title>

    <!-- App identity -->
    <meta name="application-name" content="Quest Island" />
    <meta name="theme-color" content="#ffcc66" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex,nofollow" />

    <!-- PWA manifest & icons -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;0,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- Early fix: normalize '/?shim=1/<path>' -> '/<path>?shim=1' BEFORE anything else -->
    <script>
      (function () {
        try {
          var m = location.search.match(/^\?shim=1\/(.+)/);
          if (m && m[1]) {
            var fixed = "/" + m[1] + "?shim=1" + location.hash;
            history.replaceState(null, "", fixed);
          }
        } catch (_) {}
      })();
    </script>

    <!-- Always include shim (it's a no-op unless ?shim=1) -->
    <script src="/e2e-ci-shim.js"></script>

    <!-- Conditionally boot the real app:
         If ?shim=1 AND the path is one the shim owns, SKIP booting React so
         the shim's DOM stays in #root. For all other paths, boot the app. -->
    <script>
      (function () {
        var isShim =
          /[?&]shim=1(?![^#]*=)/.test(location.search) ||
          /^\?shim=1(?:\/?|$)/.test(location.search);

        // Routes fully handled by the shim:
        var shimRoutes = new Set([
          "/", "/island", "/lesson", "/progress", "/settings",
          "/activity/act-001"
        ]);
        // Also handle biome nested path:
        var shimPrefixes = ["/island/forest"];

        function pathOwnedByShim(path) {
          if (shimRoutes.has(path)) return true;
          for (var i = 0; i < shimPrefixes.length; i++) {
            if (path.startsWith(shimPrefixes[i])) return true;
          }
          return false;
        }

        var shouldBlockApp =
          isShim && pathOwnedByShim(location.pathname);

        if (!shouldBlockApp) {
          var s = document.createElement("script");
          s.type = "module";
          s.src = "/src/main.tsx";
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>

  <body>
    <noscript>This app requires JavaScript to run. Please enable JavaScript.</noscript>
    <div id="root"></div>

    <!-- Replit dev banner (optional) -->
    <script src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
