<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Quest Island</title>

    <script>
      // Normalize legacy '?shim=1/<path>' → '/<path>?shim=1'
      (function () {
        try {
          var m = location.search.match(/^\?shim=1\/(.+)/);
          if (m && m[1]) {
            history.replaceState(null, "", "/" + m[1] + "?shim=1" + location.hash);
          }
        } catch {}
      })();

      // If ?shim=1 is present, mark it and inject the shim file from /public
      (function () {
        var hasShim =
          /(?:\?|&)shim=1(?:&|$)/.test(location.search) ||
          /^\?shim=1(?:\/|$)/.test(location.search);
        if (!hasShim) return;

        // Flag for the app boot code (main.tsx) to *not* mount React
        window.__E2E_SHIM_ACTIVE__ = true;

        // Inject the static DOM shim (Vite copies from client/public → dist root)
        var s = document.createElement("script");
        s.src = "/e2e-ci-shim.js";
        s.defer = true;
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body style="opacity:1">
    <div id="root"></div>

    <!-- Vite entry: don't point at /assets/* here. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
