mkdir -p .github/workflows
cat > .github/workflows/e2e-smoke.yml <<'EOF'
name: E2E Smoke (Teacher Panel)

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps (clean)
        run: npm ci

      # Install browsers AND the system packages they need (fixes the "missing deps" error)
      - name: Install Playwright browsers with system deps
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npx playwright test e2e/teacher-panel.spec.ts --project=chromium --reporter=line
EOF