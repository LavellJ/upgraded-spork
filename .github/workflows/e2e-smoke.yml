name: E2E Smoke (Teacher Panel)

on:
  pull_request:
  push:
    branches:
      - sprint-q-prompts
      - replit-agent
      - 'feat/**'
      - 'chore/**'
      - 'test/**'

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers + OS deps
        run: npx playwright install --with-deps

      - name: Build client (served by unified server)
        run: npm run build

      # Playwright will start the unified server defined in playwright.config.ts:
      # command: JWT_SECRET=devsecret APP_BASE_URL=http://localhost:5000 npx tsx server/index.ts
      - name: Run smoke tests (teacher panel + tabs)
        env:
          CI: 'true'
          JWT_SECRET: devsecret
          APP_BASE_URL: http://localhost:5000
          PLAYWRIGHT_BASE_URL: http://localhost:5000
        run: |
          # Run both specs (adjust/expand as you add more)
          npx playwright test e2e/teacher-panel.spec.ts --reporter=line
          npx playwright test e2e/teacher-tabs.spec.ts --reporter=line

      - name: Upload Playwright report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore