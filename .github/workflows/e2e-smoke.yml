name: e2e-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      # Install Playwright browsers + **system** dependencies (works on GitHub runners)
      - name: Install Playwright (with system deps)
        run: npx playwright install --with-deps

      # Run only the teacher-panel smoke spec; the webServer is defined in playwright.config.ts
      - name: Run smoke test
        run: npx playwright test e2e/teacher-panel.spec.ts --project=chromium --reporter=line
