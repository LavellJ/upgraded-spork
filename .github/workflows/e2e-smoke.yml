name: e2e-smoke
on: [pull_request, workflow_dispatch]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
      PORT: 5000
      HOST: 127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps (clean)
        run: npm ci

      - name: Install Playwright (browsers + system deps)
        run: npx playwright install --with-deps

      - name: Build app
        run: npm run build

      - name: Start server (prod)
        run: |
          nohup npm run start -- --port $PORT --host $HOST > /tmp/server.log 2>&1 &
          echo $! > server.pid
          sleep 2
          echo "Server pid: $(cat server.pid)"

      - name: Wait for server to be ready
        run: npx wait-on http://$HOST:$PORT --timeout 300000

      - name: Run smoke tests
        run: npx playwright test e2e/teacher-panel.spec.ts --project=chromium --reporter=line

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: /tmp/server.log

      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true
