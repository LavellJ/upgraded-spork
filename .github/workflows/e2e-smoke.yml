name: e2e-smoke
on: [pull_request, workflow_dispatch]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps (clean)
        run: npm ci

      - name: Install Playwright (browsers + system deps)
        run: npx playwright install --with-deps

      # Start your dev server first (fast) and wait for it
      - name: Start dev server
        run: |
          nohup npm run dev >/tmp/server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: npx wait-on http://127.0.0.1:5000

      - name: Run smoke tests
        run: npx playwright test e2e/teacher-panel.spec.ts --project=chromium --reporter=line

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: /tmp/server.log

      - name: Stop dev server
        if: always()
        run: kill $(cat server.pid) || true
