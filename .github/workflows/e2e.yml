name: e2e-ci-smoke
on:
  pull_request:
    branches: [ "main", "sprint-q-prompts" ]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app
        run: npm run build

      # More robust than vite preview on CI (IPv4 binding issues on some runners)
      - name: Serve dist via http-server on 4173
        run: |
          npx http-server ./dist -p 4173 --silent &
          npx wait-on http-get://127.0.0.1:4173

      - name: Run @ci smoke tests (trace always)
        env:
          CI_BASE_URL: http://127.0.0.1:4173
          SKIP_E2E_LOCAL: ''   # ensure tests do NOT skip in CI
        run: npx playwright test --project=chromium --grep "@ci" --reporter=line --trace on