name: e2e

on:
  push:
    branches: [ sprint-q-prompts ]
  pull_request:
    branches: [ sprint-q-prompts ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sanitize package.json (strip comments/trailing commas)
        run: |
          node -e "const fs=require('fs');
          let s=fs.readFileSync('package.json','utf8');
          s=s.replace(/\/\*[\s\S]*?\*\//g,'');
          s=s.replace(/(^|\s)\/\/.*$/gm,'');
          s=s.replace(/,\s*([}\]])/g,'$1');
          const obj=JSON.parse(s);
          fs.writeFileSync('package.json', JSON.stringify(obj, null, 2)+'\n');
          console.log('sanitized ✅');
          "

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers & OS deps
        run: npx playwright install --with-deps

      - name: Create .env for build & preview
        run: |
          echo "NODE_ENV=development" >> .env
          echo "PORT=4173" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "TOKEN_TTL_DAYS=30" >> .env
          echo "DATABASE_URL=file:./qi.db" >> .env
          echo "APP_BASE_URL=${{ secrets.APP_BASE_URL }}" >> .env
          echo "RETAIN_DAYS=365" >> .env
          echo "ENCRYPTION_ENABLED=true" >> .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=1025" >> .env
          echo "SMTP_USER=dummy" >> .env
          echo "SMTP_PASS=dummy" >> .env
          echo "SMTP_FROM=noreply@learnoz.local" >> .env
          echo "OPENAI_API_KEY=dummy" >> .env
          echo "ELEVENLABS_API_KEY=dummy" >> .env
          echo "VITE_APP_BASE_URL=${{ secrets.APP_BASE_URL }}" >> .env
          echo "VITE_CLOUD_ENDPOINT=${{ secrets.APP_BASE_URL }}/api" >> .env

      - name: Build app (verbose)
        run: |
          npm run build -- -d
          echo "----- dist listing -----"
          ls -la dist || true

      - name: Run Playwright tests (Chromium)
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results/**/trace.zip
