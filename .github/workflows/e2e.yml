name: e2e

on:
  push:
    branches: [ sprint-q-prompts ]
  pull_request:
    branches: [ sprint-q-prompts ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Keep CI in "development" so your app doesn't require prod-only envs
    env:
      NODE_ENV: development
      PORT: 4173
      APP_BASE_URL: http://127.0.0.1:4173
      DATABASE_URL: file:./ci.db
      JWT_SECRET: ci-test-secret
      RETAIN_DAYS: '365'
      ENCRYPTION_ENABLED: 'true'
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_USER: dummy
      SMTP_PASS: dummy
      SMTP_FROM: noreply@learnoz.local
      OPENAI_API_KEY: dummy
      ELEVENLABS_API_KEY: dummy
      # Vite build-time vars (also read by the app at runtime)
      VITE_APP_BASE_URL: http://127.0.0.1:4173
      VITE_CLOUD_ENDPOINT: http://127.0.0.1:4173/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers & OS deps
        run: npx playwright install --with-deps

      - name: Build app (serves /dist in preview)
        run: npm run build -- -d

      # Playwright will start `npm run preview` itself (see playwright.config.ts)
      - name: Run Playwright tests (Chromium)
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results/**/trace.zip