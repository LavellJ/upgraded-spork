name: e2e

on:
  push:
    branches: [ sprint-q-prompts ]
  pull_request:
    branches: [ sprint-q-prompts ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Keep CI simple: static preview on port 4173
    env:
      NODE_ENV: development
      PORT: 4173
      APP_BASE_URL: http://127.0.0.1:4173
      VITE_APP_BASE_URL: http://127.0.0.1:4173
      VITE_CLOUD_ENDPOINT: http://127.0.0.1:4173/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sanitize package.json (strip comments/trailing commas)
        run: |
          node -e "const fs=require('fs');
          let s=fs.readFileSync('package.json','utf8');
          s=s.replace(/\/\*[\s\S]*?\*\//g,'');
          s=s.replace(/(^|\s)\/\/.*$/gm,'');
          s=s.replace(/,\s*([}\]])/g,'$1');
          const obj=JSON.parse(s);
          fs.writeFileSync('package.json', JSON.stringify(obj, null, 2)+'\n');
          console.log('sanitized ✅');"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers & OS deps
        run: npx playwright install --with-deps

      # Vite reads client/.env at build time
      - name: Create client .env (Vite)
        run: |
          printf "VITE_APP_BASE_URL=%s\nVITE_CLOUD_ENDPOINT=%s\n" \
            "$VITE_APP_BASE_URL" "$VITE_CLOUD_ENDPOINT" > client/.env
          cat client/.env

      - name: Build app (verbose)
        run: |
          npm run build -- -d
          echo "----- dist/public listing -----"
          ls -la dist/public || true

      - name: Run Playwright tests (Chromium)
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results/**/trace.zip