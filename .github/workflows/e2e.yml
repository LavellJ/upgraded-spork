name: e2e-ci-smoke

on:
  pull_request:
    branches: ["main", "sprint-q-prompts"]
    paths:
      - "e2e/**"
      - "client/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      # Build with the shim flag baked in (belt + braces)
      - name: Build app (with E2E shim)
        env:
          VITE_E2E_SHIM: "1"
        run: npm run build

      # Serve the built site with SPA fallback on 127.0.0.1:4173
      - name: Start preview server (Vite)
        run: |
          npx vite preview --port 4173 --host 127.0.0.1 --strictPort &
          npx wait-on http://127.0.0.1:4173

      # Run only @ci-tagged smoke tests, always collect trace
      - name: Run @ci smoke tests (trace always)
        env:
          # If your Playwright config reads CI_BASE_URL, this will be used.
          # The ?shim=1 ensures the CI shim is enabled even if env is missed.
          CI_BASE_URL: http://127.0.0.1:4173/?shim=1
          SKIP_E2E_LOCAL: ""  # ensure tests do NOT skip in CI
        run: npx playwright test --project=chromium --grep "@ci" --reporter=line --trace on

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results/**/*.zip
          if-no-files-found: ignore