 name: CI (a11y + @ci E2E)

on:
  push:
    branches: [ main, master, 'sprint-**', 'ci/**' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.lane }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: a11y
            base_url: "http://127.0.0.1:4173/"
            test_cmd: "npx playwright test e2e/a11y.spec.ts --project=chromium --reporter=line --trace on"
          - lane: e2e
            base_url: "http://127.0.0.1:4173/?shim=1"
            test_cmd: 'npx playwright test --project=chromium --grep "@ci" --reporter=line --trace on'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root)
        run: npm ci --include=dev

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Build app (root or fallback to client/)
        shell: bash
        run: |
          set -euo pipefail
          if npm run -s build; then
            echo "✅ Built from repo root."
          elif [ -f client/package.json ]; then
            echo "ℹ️  Root build failed; trying client/…"
            pushd client >/dev/null
            npm ci --include=dev
            npm run -s build
            popd >/dev/null
            echo "✅ Built from client/."
          else
            echo "❌ No build succeeded and no client/package.json found."
            exit 1
          fi

      - name: Locate build directory
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATES=(
            "dist/public"
            "client/dist/public"
            "client/dist"
            "dist"
          )
          DIST=""
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              DIST="$d"
              break
            fi
          done
          if [ -z "$DIST" ]; then
            echo "🔍 Scanning for built index.html…"
            FOUND=$(find . -maxdepth 4 -type f -name index.html | grep -E '/(dist|build)/' | head -n1 || true)
            if [ -n "$FOUND" ]; then DIST=$(dirname "$FOUND"); fi
          fi
          if [ -z "$DIST" ]; then
            echo "❌ No build directory found." >&2
            ls -la .
            ls -la dist || true
            ls -la client/dist || true
            exit 1
          fi
          echo "dir=$DIST" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved dist dir: $DIST"
          ls -la "$DIST" | sed -n '1,120p'

      - name: Ensure CI shim is in build output (e2e only)
        if: ${{ matrix.lane == 'e2e' }}
        shell: bash
        run: |
          set -euo pipefail
          DIST="${{ steps.dist.outputs.dir }}"
          SRC=""
          if [ -f "client/public/e2e-ci-shim.js" ]; then
            SRC="client/public/e2e-ci-shim.js"
          elif [ -f "public/e2e-ci-shim.js" ]; then
            SRC="public/e2e-ci-shim.js"
          fi
          if [ -n "$SRC" ]; then
            cp "$SRC" "$DIST/e2e-ci-shim.js"
            echo "✅ Copied $SRC -> $DIST/e2e-ci-shim.js"
          else
            echo "⚠️  No e2e-ci-shim.js found (continuing)."
          fi
          ls -la "$DIST" | sed -n '1,120p'

      - name: Serve build with vite preview
        shell: bash
        run: |
          set -euo pipefail
          npx vite preview --port 4173 --host 127.0.0.1 --strictPort &
          npx wait-on "http://127.0.0.1:4173/"

      - name: Sanity-check — a11y lane
        if: ${{ matrix.lane == 'a11y' }}
        shell: bash
        run: |
          set -euo pipefail
          url="http://127.0.0.1:4173/"
          code=$(curl -sS -L -H "Accept: text/html" -o /dev/null -w "%{http_code}" "$url")
          echo "$code  $url"
          [[ "$code" == 2* || "$code" == 3* ]]

      - name: Sanity-check — e2e lane
        if: ${{ matrix.lane == 'e2e' }}
        shell: bash
        run: |
          set -euo pipefail
          urls=(
            "http://127.0.0.1:4173/"
            "http://127.0.0.1:4173/island?shim=1"
            "http://127.0.0.1:4173/progress?shim=1"
            "http://127.0.0.1:4173/settings?shim=1"
            "http://127.0.0.1:4173/teacher/assignments?shim=1"
          )
          for url in "${urls[@]}"; do
            code=$(curl -sS -L -H "Accept: text/html" -o /dev/null -w "%{http_code}" "$url")
            echo "$code  $url"
            if [[ "$code" != 2* && "$code" != 3* ]]; then
              echo "❌ Sanity failed for $url"
              exit 1
            fi
          done
          echo "✅ Sanity OK"

      - name: Run tests — ${{ matrix.lane }}
        env:
          E2E_BASE_URL: ${{ matrix.base_url }}
        run: ${{ matrix.test_cmd }}

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.lane }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore