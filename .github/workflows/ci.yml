name: CI (a11y + @ci E2E)

on:
  push:
    branches:
      - main
      - master
      - sprint-**
      - ci/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.lane }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Lane 1: Accessibility (no shim). Served by vite preview.
          - lane: a11y
            serve_mode: vite
            base_url: "http://127.0.0.1:4173/"
            test_cmd: "npx playwright test e2e/a11y.spec.ts --project=chromium --reporter=line --trace on"
          # Lane 2: @ci E2E against static dist with SPA routing (+ shim)
          - lane: e2e
            serve_mode: static
            base_url: "http://127.0.0.1:4173/?shim=1"
            test_cmd: 'npx playwright test --project=chromium --grep "@ci" --reporter=line --trace on'

    env:
      # Ensure devDependencies (vite, http-server, etc.) are installed on CI
      # without relying on NODE_ENV hacks.
      PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (incl. dev)
        run: npm ci --include=dev

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Build (npx guarantees vite presence)
        run: npx vite build

      - name: Locate build directory
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          # Prefer typical monorepo output first.
          if [ -d "dist/public" ]; then
            echo "dir=dist/public" >> "$GITHUB_OUTPUT"
          elif [ -d "client/dist" ]; then
            echo "dir=client/dist" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "❌ No build directory found (tried dist/public, client/dist, dist)"; exit 1
          fi
          echo "Resolved dist dir: ${{ steps.dist.outputs.dir }}"
          ls -la "${{ steps.dist.outputs.dir }}"

      - name: Ensure CI shim is in build output (e2e only)
        if: ${{ matrix.lane == 'e2e' }}
        shell: bash
        run: |
          set -euo pipefail
          DIST="${{ steps.dist.outputs.dir }}"
          SRC=""
          if [ -f "client/public/e2e-ci-shim.js" ]; then
            SRC="client/public/e2e-ci-shim.js"
          elif [ -f "public/e2e-ci-shim.js" ]; then
            SRC="public/e2e-ci-shim.js"
          fi

          if [ -n "$SRC" ]; then
            cp "$SRC" "$DIST/e2e-ci-shim.js"
            echo "✅ Copied $SRC -> $DIST/e2e-ci-shim.js"
          else
            echo "⚠️  No e2e-ci-shim.js found in client/public or public (continuing)"
          fi

          ls -la "$DIST" | sed -n '1,120p'

      - name: Serve (vite preview) — a11y lane
        if: ${{ matrix.serve_mode == 'vite' }}
        shell: bash
        run: |
          set -euo pipefail
          npx vite preview --port 4173 --host 127.0.0.1 --strictPort &
          npx wait-on "http://127.0.0.1:4173/"

      - name: Serve (static SPA) — e2e lane
        if: ${{ matrix.serve_mode == 'static' }}
        shell: bash
        run: |
          set -euo pipefail
          npx http-server "${{ steps.dist.outputs.dir }}" -p 4173 --spa --silent &
          npx wait-on "http://127.0.0.1:4173/"

      - name: Sanity-check — a11y lane
        if: ${{ matrix.lane == 'a11y' }}
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -L -H "Accept: text/html" -o /dev/null -w "%{http_code}" "http://127.0.0.1:4173/")
          echo "$code  http://127.0.0.1:4173/"
          [[ "$code" == 2* || "$code" == 3* ]]

      - name: Sanity-check — e2e lane
        if: ${{ matrix.lane == 'e2e' }}
        shell: bash
        run: |
          set -euo pipefail
          urls=(
            "http://127.0.0.1:4173/"
            "http://127.0.0.1:4173/island?shim=1"
            "http://127.0.0.1:4173/progress?shim=1"
            "http://127.0.0.1:4173/settings?shim=1"
            "http://127.0.0.1:4173/teacher/assignments?shim=1"
          )
          for url in "${urls[@]}"; do
            code=$(curl -sS -L -H "Accept: text/html" -o /dev/null -w "%{http_code}" "$url")
            echo "$code  $url"
            if [[ "$code" != 2* && "$code" != 3* ]]; then
              echo "❌ Sanity failed for $url"
              exit 1
            fi
          done
          echo "✅ Sanity OK"

      - name: Run tests — ${{ matrix.lane }}
        run: ${{ matrix.test_cmd }}

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.lane }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore