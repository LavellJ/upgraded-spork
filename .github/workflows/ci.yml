name: ci-matrix
on:
  push:
    branches: [ main, master, sprint-**, ci/** ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        lane: [ a11y, e2e ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci || npm i

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Serve static build (SPA)
        run: |
          DIST=""
          if [ -d ./dist/public ]; then DIST=./dist/public; fi
          if [ -d ./client/dist ]; then DIST=./client/dist; fi
          if [ -z "$DIST" ]; then echo "No dist found" && ls -la && exit 1; fi
          npx http-server "$DIST" -p 4173 --spa --silent &
          npx wait-on http://127.0.0.1:4173

      - name: Run lane
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "1"
        run: |
          if [ "${{ matrix.lane }}" = "a11y" ]; then
            npx playwright test e2e/a11y.spec.ts --project=chromium --reporter=line --trace on
          else
            npx playwright test --project=chromium --grep "@ci" --reporter=line --trace on
          fi

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.lane }}
          path: test-results/**/*.zip
