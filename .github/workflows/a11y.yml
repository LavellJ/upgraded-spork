name: a11y
on:
  push:
    branches: [ main, master, sprint-* ]
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx http-server ./dist -p 4173 --silent & npx wait-on http://127.0.0.1:4173
      - run: npx playwright test e2e/a11y.spec.ts --project=chromium