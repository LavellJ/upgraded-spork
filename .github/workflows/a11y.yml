name: a11y
on:
  push:
    branches:
      - main
      - master
      - sprint-**
      - ci/**
      - ci/smokelane
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Verify build output exists
        run: ls -la ./client/dist || ls -la ./dist
      - name: Serve built app
        run: |
          if [ -d ./client/dist ]; then DIST=./client/dist; else DIST=./dist; fi
          npx http-server "$DIST" -p 4173 --silent & npx wait-on http://127.0.0.1:4173
      - name: Run a11y tests (Chromium)
        run: npx playwright test e2e/a11y.spec.ts --project=chromium